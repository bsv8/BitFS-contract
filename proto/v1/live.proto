syntax = "proto3";

package bitfs.v1;

import "v1/common.proto";

option go_package = "github.com/bsv8/bitfs-contract/gen/go/v1;bitfsv1";

// 直播段摘要（头推送里不带媒体内容）。
message LiveSegmentData {
  uint32 version = 1;
  string stream_id = 2;
  uint64 segment_index = 3;
  string prev_seed_hash = 4;
  string publisher_pubkey = 5;
  bytes media_hash = 6;
  uint64 duration_ms = 7;
  int64 published_at_unix_ms = 8;
  bool is_discontinuity = 9;
  string mime_type = 10;
  string init_seed_hash = 11;
  string playlist_uri_hint = 12;
  uint64 media_sequence = 13;
  bool is_end = 14;
}

message LiveSegment {
  bytes data = 1;
  bytes media_bytes = 2;
  bytes signature = 3;
}

// 实时报价提交。
message LiveQuoteSubmitReq {
  string demand_id = 1;
  string seller_pubkey_hex = 2;
  string stream_id = 3;
  uint64 latest_segment_index = 4;
  repeated LiveSegmentRef recent_segments = 5;
  int64 expires_at_unix = 6;
}

message LiveQuoteSubmitResp {
  string status = 1;
}

// 订阅直播流。
message LiveSubscribeReq {
  string stream_uri = 1;
  string stream_id = 2;
  uint32 window = 3;
  string subscriber_pubkey_hex = 4;
  repeated string subscriber_addrs = 5;
}

message LiveSubscribeResp {
  string status = 1;
  string stream_id = 2;
  string publisher_pubkey = 3;
  repeated LiveSegmentRef recent_segments = 4;
}

// 发布者向订阅者推送最新头部。
message LiveHeadPushReq {
  string stream_id = 1;
  string publisher_pubkey = 2;
  repeated LiveSegmentRef recent_segments = 3;
  int64 sent_at_unix = 4;
}

message LiveHeadPushResp {
  string status = 1;
}
